name: Verify and Deploy

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]

            jobs:
              verify:
                  runs-on: ubuntu-latest
                      steps:
                            - name: Checkout repository
                                    uses: actions/checkout@v6

                                          - name: Setup pnpm
                                                  uses: pnpm/action-setup@v4
                                                          with:
                                                                    version: 10.23.0

                                                                          - name: Setup Node.js
                                                                                  uses: actions/setup-node@v6
                                                                                          with:
                                                                                                    node-version: '20'
                                                                                                              cache: 'pnpm'
                                                                                                              
                                                                                                                    - name: Verify env contract (warn only)
                                                                                                                            run: pnpm verify:ops:contract
                                                                                                                            
                                                                                                                                  - name: Install dependencies
                                                                                                                                          run: pnpm install --frozen-lockfile
                                                                                                                                          
                                                                                                                                                - name: Check content manifest
                                                                                                                                                        run: pnpm check:content
                                                                                                                                                        
                                                                                                                                                              - name: Typecheck
                                                                                                                                                                      run: pnpm typecheck
                                                                                                                                                                      
                                                                                                                                                                            - name: Run unit tests
                                                                                                                                                                                    run: pnpm test:unit
                                                                                                                                                                                    
                                                                                                                                                                                          - name: Build project
                                                                                                                                                                                                  run: pnpm build
                                                                                                                                                                                                  
                                                                                                                                                                                                        - name: Run production smoke tests
                                                                                                                                                                                                                run: pnpm test:smoke
                                                                                                                                                                                                                
                                                                                                                                                                                                                  deploy_gate:
                                                                                                                                                                                                                      needs: verify
                                                                                                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                                                                                                              outputs:
                                                                                                                                                                                                                                    enabled: ${{ steps.check.outputs.enabled }}
                                                                                                                                                                                                                                        steps:
                                                                                                                                                                                                                                              - name: Check Vercel deployment secrets
                                                                                                                                                                                                                                                      id: check
                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                                                                                                                                                                                                                                                                                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                                                                                                                                                                                                                                                                                            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                              if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; t
