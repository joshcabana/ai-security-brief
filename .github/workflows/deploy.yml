name: Verify and Deploy
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'


      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      - name: Install Vercel CLI
        run: pnpm dlx vercel@latest --version


      - name: Pull Vercel environment information
        run: pnpm dlx vercel@latest pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}


      - name: Build project
        run: pnpm dlx vercel@latest build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}


      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            DEPLOYMENT_URL=$(pnpm dlx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            DEPLOYMENT_URL=$(pnpm dlx vercel@latest deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT


  verify_live:
    needs: [verify, deploy]
    if: ${{ always() && github.ref == 'refs/heads/main' && needs.verify.result == 'success' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'


      - name: Verify live production (warn only)
        id: verify_live
        continue-on-error: true
        run: node scripts/verify-live.mjs --base-url https://aithreatbrief.com --output verify-live.json


      - name: Upload live verification artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verify-live
          path: verify-live.json


  status:
    needs: [verify, deploy, verify_live]
    if: ${{ always() && github.ref == 'refs/heads/main' && needs.verify.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'


      - name: Download live verification artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: verify-live
          path: .


      - name: Generate status.json
        env:
          DEPLOY_SKIPPED: ${{ needs.deploy.result == 'skipped' && 'true' || 'false' }}
        run: node scripts/generate-status.mjs --live-report verify-live.json --output status.json


      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: status
          path: status.json
          retention-days: 90

